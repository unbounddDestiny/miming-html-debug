name: Manga Chapter Scraper

on:
  workflow_dispatch:
    inputs:
      urls:
        description: |
          Chapter URLs to scrape (one per line).
          Leave blank to use urls.txt from the repo.
        required: false
        default: ""
      commit_results:
        description: "Commit downloaded images + PDFs back to this repo"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 h ceiling — large chapters with stability delays need time

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      # ── 2. Write override urls.txt if URLs were supplied via the UI ────────
      - name: Prepare URL list
        env:
          URL_INPUT: ${{ inputs.urls }}
        run: |
          set -euo pipefail
          if [ -n "$URL_INPUT" ]; then
            echo "Using URLs from workflow input."
            printf '%s\n' "$URL_INPUT" > urls.txt
          elif [ -f urls.txt ]; then
            echo "Using existing urls.txt from the repo."
          else
            echo "::error::No URLs provided and no urls.txt found in the repository."
            exit 1
          fi

          # Strip Windows line endings, blank lines, and deduplicate
          sed -i 's/\r$//' urls.txt
          awk 'NF && !seen[$0]++' urls.txt > urls_clean.txt
          mv urls_clean.txt urls.txt

          echo "--- URLs to scrape ---"
          cat urls.txt
          echo "--- ($(wc -l < urls.txt) URL(s)) ---"

      # ── 3. Python setup ────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      # ── 4. Install Python dependencies ────────────────────────────────────
      - name: Install Python packages
        run: pip install -r requirements.txt

      # ── 5. Install Chromium + all system dependencies ─────────────────────
      #   --with-deps handles libnspr, libgbm, and every other system lib
      #   automatically on the ubuntu-latest runner.
      - name: Install Chromium (with system dependencies)
        run: playwright install --with-deps chromium

      # ── 6. Run the scraper ─────────────────────────────────────────────────
      - name: Run scraper
        run: python scraper.py
        # The scraper exits non-zero only on import/parse errors.
        # Per-chapter failures are reported in stdout but do not abort the run
        # so all chapters are attempted even if one fails.

      # ── 7. List results ────────────────────────────────────────────────────
      - name: Show download summary
        if: always()
        run: |
          echo "=== Download tree ==="
          find downloads/ -type f | sort || echo "(nothing downloaded)"

      # ── 8. Upload artifact ─────────────────────────────────────────────────
      - name: Upload downloaded chapters
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: manga-chapters
          path: downloads/
          retention-days: 30
          if-no-files-found: warn

      # ── 9. Optional: commit results back to the repo ───────────────────────
      - name: Commit downloaded chapters to repo
        if: ${{ inputs.commit_results == 'true' }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Make sure downloads/ is tracked (it is in .gitignore locally,
          # but we intentionally add it here when commit_results is true).
          git add -f downloads/

          if git diff --cached --quiet; then
            echo "No new files to commit."
            exit 0
          fi

          CHAPTER_COUNT=$(find downloads/ -name "chapter.pdf" | wc -l | tr -d ' ')
          git commit -m "chore: add $CHAPTER_COUNT scraped chapter(s) [skip ci]"

          # Retry push with rebase in case of concurrent commits
          for attempt in 1 2 3; do
            git fetch origin "${{ github.ref_name }}"
            if git rebase "origin/${{ github.ref_name }}" && \
               git push origin "HEAD:${{ github.ref_name }}"; then
              echo "Pushed successfully on attempt $attempt."
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $(( 3 + RANDOM % 4 ))
          done

          echo "::warning::Could not push after 3 attempts — the artifact still has your files."
          exit 0
